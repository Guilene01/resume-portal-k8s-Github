apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  namespace: default
  labels:
    app: flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      serviceAccountName: flask-sa
      containers:
      - name: flask
        image: 977098999802.dkr.ecr.us-east-1.amazonaws.com/resume-portal-flask:latest
        ports:
        - containerPort: 5000
        env:
        - name: AWS_REGION
          value: "us-east-1"
        - name: RESUME_BUCKET
          value: "resume-portal-resumes-prod"
        - name: DB_SECRET_NAME
          value: "resume-portal/db-credentials"
        - name: SENDER_EMAIL
          value: "guileneerna@gmail.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::977098999802:role/resume-portal-flask-pod-role