name: Build & Deploy to EKS

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'frontend/**'
      - 'k8s/**'

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: resume-portal-cluster
  DOMAIN_NAME: gamela.shop
  ECR_FLASK: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/resume-portal-flask
  ECR_NGINX: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/resume-portal-nginx

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        role-session-name: GitHubActions
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push Flask image
      run: |
        docker build -t $ECR_FLASK:${{ github.sha }} -t $ECR_FLASK:latest ./app
        docker push $ECR_FLASK:${{ github.sha }}
        docker push $ECR_FLASK:latest

    - name: Build & Push Nginx image
      run: |
        docker build -t $ECR_NGINX:${{ github.sha }} -t $ECR_NGINX:latest ./frontend
        docker push $ECR_NGINX:${{ github.sha }}
        docker push $ECR_NGINX:latest

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

    - name: Update ingress certificate ARN
      run: |
        echo "Getting ACM certificate ARN..."
        CERT_ARN=$(aws acm list-certificates \
          --region us-east-1 \
          --query "CertificateSummaryList[?DomainName==\`$DOMAIN_NAME\`].CertificateArn" \
          --output text | awk '{print $1}')
        echo "Certificate ARN: $CERT_ARN"
        sed -i "s|alb.ingress.kubernetes.io/certificate-arn:.*|alb.ingress.kubernetes.io/certificate-arn: $CERT_ARN|" k8s/ingress.yaml
        echo "✅ Ingress certificate ARN updated"

    - name: Update K8s manifests with account ID
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        sed -i "s|ACCOUNT_ID|$ACCOUNT_ID|g" k8s/flask/deployment.yaml
        sed -i "s|ACCOUNT_ID|$ACCOUNT_ID|g" k8s/nginx/deployment.yaml
        echo "✅ Manifests updated with account ID: $ACCOUNT_ID"

    - name: Apply K8s manifests
      run: |
        kubectl apply -f k8s/flask/configmap.yaml
        kubectl apply -f k8s/flask/secret.yaml
        kubectl apply -f k8s/flask/deployment.yaml
        kubectl apply -f k8s/flask/service.yaml
        kubectl apply -f k8s/flask/hpa.yaml
        kubectl apply -f k8s/nginx/deployment.yaml
        kubectl apply -f k8s/nginx/service.yaml
        kubectl apply -f k8s/ingress.yaml

    - name: Update Flask image
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        kubectl set image deployment/flask-deployment \
          flask=$ECR_FLASK:${{ github.sha }}
        kubectl rollout status deployment/flask-deployment --timeout=300s

    - name: Debug Flask pods if failing
      if: failure()
      run: |
        echo "=== Pod Status ==="
        kubectl get pods -l app=flask
        echo "=== Pod Description ==="
        kubectl describe pods -l app=flask
        echo "=== Pod Logs ==="
        kubectl logs -l app=flask --tail=50

    - name: Update Nginx image
      run: |
        kubectl set image deployment/nginx-deployment \
          nginx=$ECR_NGINX:${{ github.sha }}
        kubectl rollout status deployment/nginx-deployment --timeout=300s

    - name: Wait for ALB and update Route 53
      run: |
        echo "Waiting for ALB address..."
        for i in $(seq 1 20); do
          ALB=$(kubectl get ingress resume-portal-ingress \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          if [ -n "$ALB" ]; then
            echo "✅ ALB: $ALB"
            break
          fi
          echo "Attempt $i/20 - waiting 15s..."
          sleep 15
        done

        if [ -z "$ALB" ]; then
          echo "❌ ALB not ready after 5 minutes"
          exit 1
        fi

        ZONE_ID=$(aws route53 list-hosted-zones \
          --query "HostedZones[?Name==\`$DOMAIN_NAME.\`].Id" \
          --output text | sed 's|/hostedzone/||')

        aws route53 change-resource-record-sets \
          --hosted-zone-id $ZONE_ID \
          --change-batch "{
            \"Changes\": [
              {
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"resume.$DOMAIN_NAME\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"Z35SXDOTRQ7X7K\",
                    \"DNSName\": \"$ALB\",
                    \"EvaluateTargetHealth\": true
                  }
                }
              },
              {
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"api.$DOMAIN_NAME\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"Z35SXDOTRQ7X7K\",
                    \"DNSName\": \"$ALB\",
                    \"EvaluateTargetHealth\": true
                  }
                }
              }
            ]
          }"
        echo "✅ Route 53 updated:"
        echo "   resume.$DOMAIN_NAME → $ALB"
        echo "   api.$DOMAIN_NAME → $ALB"

    - name: Verify deployment
      run: |
        echo "=== Pods ==="
        kubectl get pods
        echo "=== Services ==="
        kubectl get services
        echo "=== Ingress ==="
        kubectl get ingress
        echo "=== HPA ==="
        kubectl get hpa
        echo ""
        echo "✅ Frontend live at https://resume.$DOMAIN_NAME"
        echo "✅ API live at https://api.$DOMAIN_NAME"
        echo "⏳ Infrastructure will be destroyed in 30 minutes..."

  destroy:
    name: Destroy Everything After 30 Minutes
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Wait 30 minutes
      run: |
        echo "✅ Deployment successful!"
        echo "⏳ Waiting 30 minutes before destroying..."
        echo "🌐 Frontend: https://resume.${{ env.DOMAIN_NAME }}"
        echo "🌐 API: https://api.${{ env.DOMAIN_NAME }}"
        for i in $(seq 30 -1 1); do
          echo "⏳ $i minutes remaining..."
          sleep 60
        done
        echo "⏰ Time is up! Starting destroy..."

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        role-session-name: GitHubActionsDestroy
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

    - name: Delete K8s resources first
      run: |
        echo "=== Removing K8s resources ==="
        kubectl delete -f k8s/ingress.yaml --ignore-not-found
        kubectl delete -f k8s/flask/hpa.yaml --ignore-not-found
        kubectl delete -f k8s/flask/service.yaml --ignore-not-found
        kubectl delete -f k8s/flask/deployment.yaml --ignore-not-found
        kubectl delete -f k8s/flask/secret.yaml --ignore-not-found
        kubectl delete -f k8s/flask/configmap.yaml --ignore-not-found
        kubectl delete -f k8s/nginx/service.yaml --ignore-not-found
        kubectl delete -f k8s/nginx/deployment.yaml --ignore-not-found
        echo "⏳ Waiting for ALB to be fully deleted..."
        sleep 120

    - name: Force delete any remaining Load Balancers
      run: |
        echo "=== Checking for leftover Load Balancers ==="
        LBS=$(aws elbv2 describe-load-balancers \
          --query 'LoadBalancers[?contains(LoadBalancerName, `k8s`)].LoadBalancerArn' \
          --output text --region us-east-1)
        if [ -n "$LBS" ]; then
          for LB in $LBS; do
            echo "Deleting $LB"
            aws elbv2 delete-load-balancer \
              --load-balancer-arn $LB \
              --region us-east-1
          done
          echo "⏳ Waiting for Load Balancers to delete..."
          sleep 90
        else
          echo "No leftover Load Balancers found ✅"
        fi

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.10.0

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform Destroy
      working-directory: terraform
      run: |
        echo "=== Destroying all infrastructure ==="
        terraform destroy -auto-approve
        echo "✅ All infrastructure destroyed!"

    - name: Notify destroy complete
      run: |
        echo "======================================"
        echo "✅ DESTROY COMPLETE"
        echo "All AWS resources have been destroyed"
        echo "💰 No more charges accumulating"
        echo "======================================"