<!DOCTYPE html>
<html lang="en">
<head>
  <title> Submit Your Resume</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }


    :root {
      --navy: #0A1F3D;
      --navy-light: #1A3258;
      --amber: #F4B860;
      --amber-dark: #C7902F;
      --success: #059669;
      --danger: #DC2626;
      --bg: #F8FAFC;
      --text: #0F172A;
      --muted: #64748B;
      --border: #E2E8F0;
      --border-focus: #1A3258;
    }


    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.5;
    }


    .container { max-width: 640px; margin: 0 auto; }


    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      border-radius: 16px 16px 0 0;
      padding: 48px 40px 40px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(244,184,96,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-block;
      background: rgba(244,184,96,0.15);
      color: var(--amber);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    .hero p { color: rgba(255,255,255,0.7); font-size: 15px; }


    .card {
      background: white;
      border-radius: 0 0 16px 16px;
      padding: 40px;
      box-shadow: 0 10px 40px -10px rgba(10,31,61,0.15);
    }


    .field {
      position: relative;
      margin-bottom: 20px;
    }
    .field input,
    .field textarea {
      width: 100%;
      padding: 22px 16px 8px;
      font-size: 15px;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: white;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field textarea {
      min-height: 90px;
      resize: vertical;
      padding-top: 28px;
    }
    .field input:focus,
    .field textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(26,50,88,0.1);
    }
    .field label {
      position: absolute;
      top: 18px;
      left: 16px;
      font-size: 15px;
      color: var(--muted);
      pointer-events: none;
      transition: all 0.15s ease;
      background: white;
      padding: 0 4px;
    }
    .field input:focus + label,
    .field input:not(:placeholder-shown) + label,
    .field textarea:focus + label,
    .field textarea:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 12px;
      color: var(--navy-light);
      font-weight: 600;
    }
    .field.valid input, .field.valid textarea { border-color: var(--success); }
    .field.invalid input, .field.invalid textarea { border-color: var(--danger); }
    .field-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      margin-left: 4px;
      min-height: 16px;
    }
    .field.invalid .field-hint { color: var(--danger); }


    .file-zone {
      display: block;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #FAFBFD;
      margin-bottom: 8px;
    }
    .file-zone:hover { border-color: var(--navy-light); background: #F1F5F9; }
    .file-zone.dragging {
      border-color: var(--amber);
      background: rgba(244,184,96,0.05);
      transform: scale(1.01);
    }
    .file-zone.has-file {
      border-style: solid;
      border-color: var(--success);
      background: #ECFDF5;
    }
    .file-zone-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      display: block;
      color: var(--navy-light);
    }
    .file-zone.has-file .file-zone-icon { color: var(--success); }
    .file-zone-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .file-zone-sub { font-size: 13px; color: var(--muted); }
    .file-zone-name { font-weight: 600; color: var(--success); margin-top: 8px; word-break: break-all; }
    .file-zone input[type="file"] { display: none; }


    .submit-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      background: var(--amber);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--amber-dark);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px -8px rgba(199,144,47,0.5);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { background: #E2E8F0; color: #94A3B8; cursor: not-allowed; }
    .submit-btn .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(10,31,61,0.2);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }


    .result {
      margin-top: 24px;
      padding: 18px 20px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      animation: slideIn 0.3s ease-out;
    }
    .result.show { display: flex; align-items: flex-start; gap: 12px; }
    .result.success { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
    .result.error { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
    .result-icon { flex-shrink: 0; width: 20px; height: 20px; margin-top: 1px; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }


    .footer { text-align: center; margin-top: 24px; color: var(--muted); font-size: 13px; }


    @media (max-width: 600px) {
      .hero, .card { padding: 32px 24px; }
      .hero h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <span class="hero-badge">We're Hiring</span>
      <h1>Kindly Submit Your Application</h1>
      <p>Tell us about yourself and upload your resume. We'll be in touch soon.</p>
    </div>


    <div class="card">
      <form id="resumeForm" novalidate>
        <div class="field" data-field="fullName">
          <input type="text" id="fullName" placeholder=" " required minlength="2">
          <label for="fullName">Full name</label>
          <div class="field-hint"></div>
        </div>


        <div class="field" data-field="email">
          <input type="email" id="email" placeholder=" " required>
          <label for="email">Email address</label>
          <div class="field-hint"></div>
        </div>


        <div class="field" data-field="phone">
          <input type="tel" id="phone" placeholder=" " required minlength="7">
          <label for="phone">Phone number</label>
          <div class="field-hint"></div>
        </div>


        <div class="field" data-field="position">
          <input type="text" id="position" placeholder=" " required minlength="2">
          <label for="position">Position you're applying for</label>
          <div class="field-hint"></div>
        </div>


        <div class="field" data-field="skills">
          <textarea id="skills" placeholder=" " required minlength="3"></textarea>
          <label for="skills">Top 3 skills (comma-separated)</label>
          <div class="field-hint"></div>
        </div>


        <label class="file-zone" id="fileZone">
          <!-- FIXED: reliable multi-element upload icon -->
          <svg class="file-zone-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"></polyline>
            <line x1="12" y1="12" x2="12" y2="21"></line>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
          </svg>
          <div class="file-zone-text" id="fileText">Drop your resume here or click to browse</div>
          <div class="file-zone-sub">PDF only, up to 5MB</div>
          <div class="file-zone-name" id="fileName"></div>
          <input type="file" id="resume" accept=".pdf" required>
        </label>
        <div class="field-hint" id="fileHint"></div>


        <button type="submit" class="submit-btn" id="submitBtn" disabled>
          <div class="spinner"></div>
          <span class="btn-text">Submit application</span>
        </button>
      </form>


      <div class="result" id="result"></div>
    </div>


    <p class="footer">Your information is encrypted and stored securely.</p>
  </div>


  <script>
    const API_URL = 'https://api.gamela.shop/submit';


    const form = document.getElementById('resumeForm');
    const submitBtn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const fileInput = document.getElementById('resume');
    const fileZone = document.getElementById('fileZone');
    const fileText = document.getElementById('fileText');
    const fileName = document.getElementById('fileName');
    const fileHint = document.getElementById('fileHint');


    const validators = {
      fullName: v => v.trim().length >= 2 || 'Please enter your full name',
      email: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) || 'Please enter a valid email',
      phone: v => v.replace(/\D/g, '').length >= 7 || 'Please enter a valid phone number',
      position: v => v.trim().length >= 2 || 'Please enter the position',
      skills: v => v.trim().length >= 3 || 'Please list at least one skill',
    };


    function validateField(name) {
      const input = document.getElementById(name);
      const wrapper = document.querySelector(`[data-field="${name}"]`);
      const hint = wrapper.querySelector('.field-hint');
      const res = validators[name](input.value);
      if (res === true) {
        wrapper.classList.add('valid');
        wrapper.classList.remove('invalid');
        hint.textContent = '';
        return true;
      } else if (input.value.length > 0) {
        wrapper.classList.add('invalid');
        wrapper.classList.remove('valid');
        hint.textContent = res;
        return false;
      } else {
        wrapper.classList.remove('valid', 'invalid');
        hint.textContent = '';
        return false;
      }
    }


    function validateFile() {
      const file = fileInput.files[0];
      if (!file) { fileHint.textContent = ''; fileHint.style.color = ''; return false; }
      if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
        fileHint.textContent = 'Please upload a PDF file';
        fileHint.style.color = 'var(--danger)';
        fileZone.classList.remove('has-file');
        return false;
      }
      if (file.size > 5 * 1024 * 1024) {
        fileHint.textContent = 'File too large (max 5MB)';
        fileHint.style.color = 'var(--danger)';
        fileZone.classList.remove('has-file');
        return false;
      }
      fileHint.textContent = '';
      fileZone.classList.add('has-file');
      fileText.textContent = 'Resume ready to upload';
      fileName.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
      return true;
    }


    function checkFormValidity() {
      const allValid = Object.keys(validators).every(name =>
        validators[name](document.getElementById(name).value) === true
      ) && validateFile();
      submitBtn.disabled = !allValid;
    }


    Object.keys(validators).forEach(name => {
      const input = document.getElementById(name);
      input.addEventListener('blur', () => validateField(name));
      input.addEventListener('input', () => {
        if (document.querySelector(`[data-field="${name}"]`).classList.contains('invalid')) validateField(name);
        checkFormValidity();
      });
    });


    fileInput.addEventListener('change', () => { validateFile(); checkFormValidity(); });


    ['dragenter', 'dragover'].forEach(e => fileZone.addEventListener(e, ev => {
      ev.preventDefault(); fileZone.classList.add('dragging');
    }));
    ['dragleave', 'drop'].forEach(e => fileZone.addEventListener(e, ev => {
      ev.preventDefault(); fileZone.classList.remove('dragging');
    }));
    fileZone.addEventListener('drop', ev => {
      const files = ev.dataTransfer.files;
      if (files.length) { fileInput.files = files; validateFile(); checkFormValidity(); }
    });


    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }


    function showResult(type, message) {
      const icon = type === 'success'
        ? '<svg class="result-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>'
        : '<svg class="result-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
      result.className = 'result show ' + type;
      result.innerHTML = icon + '<div>' + message + '</div>';
    }


    form.addEventListener('submit', async e => {
      e.preventDefault();
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      result.className = 'result';


      try {
        const file = fileInput.files[0];
        const base64 = await fileToBase64(file);
        const data = {
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          position: document.getElementById('position').value,
          // FIXED: send as array, not plain string
          skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(Boolean),
          resume: base64,
          fileName: file.name
        };
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const r = await response.json();
        if (response.ok) {
          showResult('success', '<strong>Application submitted!</strong><br>Check your email for a confirmation message.');
          form.reset();
          fileZone.classList.remove('has-file');
          fileText.textContent = 'Drop your resume here or click to browse';
          fileName.textContent = '';
          document.querySelectorAll('.field').forEach(f => f.classList.remove('valid', 'invalid'));
        } else {
          throw new Error(r.error || 'Submission failed. Please try again.');
        }
      } catch (err) {
        showResult('error', '<strong>Something went wrong</strong><br>' + err.message);
      } finally {
        submitBtn.classList.remove('loading');
        checkFormValidity();
      }
    });
  </script>
</body>
</html>
